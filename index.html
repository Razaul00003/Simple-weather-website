<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Temperature Hot</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <!-- Bootstrap CSS -->
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
    />
    <style>
      body {
        background: url(images/bg-image.jpg) no-repeat;
        background-size: cover;
        height: 100vh;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <form class="col-md-6 m-auto py-5">
        <div class="input-group mb-3">
          <input
            type="text"
            class="form-control"
            id="input-city"
            placeholder="Enter a location for Weather ..."
          />
          <div class="input-group-append">
            <button type="button" class="btn btn-danger" id="submit">
              Search
            </button>
          </div>
        </div>
      </form>
      <div class="weather-status text-white text-center">
        <img
          id="weather-icon"
          src="https://openweathermap.org/img/wn/02d@2x.png"
          alt=""
        />
        <h1 id="city">Dhaka</h1>
        <h3><span id="temp">38.06</span>&deg;C</h3>
        <h1 class="lead" id="status">Clouds</h1>
      </div>
    </div>
    <script>
      const API_KEY = `46ad7457603b9b0104e633e78cd60e16`;
      document.getElementById("submit").addEventListener("click", function () {
        const city = document.getElementById("input-city").value;
        const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`;
        fetch(url)
          .then((res) => res.json())
          .then((data) => {
            // console.log(data);
            const tempData = data.weather;
            document.getElementById("city").innerText = data.name;
            document.getElementById("temp").innerText = data.main.temp;
            document.getElementById("status").innerText = data.weather[0].main;
            const imgUrl = `http://openweathermap.org/img/wn/${data.weather[0].icon}@2x.png`;
            const imgIcon = document.getElementById("weather-icon");
            imgIcon.setAttribute("src", imgUrl);
          });
          .catch(err=>{
              alert(" Wrong input")
          })
      });
    </script>
  </body>
</html>
